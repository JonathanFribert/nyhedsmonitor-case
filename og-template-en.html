<!doctype html>
<!-- Editable source for og-image-en.png (1200x630). -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,700&amp;family=IBM+Plex+Mono:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    position: relative; background: #FAF7F0; color: #1B1A17;
    padding: 46px 80px 0; font-family: "IBM Plex Mono", monospace;
  }
  .masthead-line { display: flex; justify-content: space-between; font-size: 19px; font-weight: 700; letter-spacing: 0.12em; }
  .masthead-rule { height: 8px; margin-top: 10px; border-top: 4px solid #1B1A17; border-bottom: 1px solid #1B1A17; }
  h1 {
    max-width: none; margin-top: 36px; font-family: "Newsreader", Georgia, serif;
    font-size: 66px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.08;
  }
  hr { margin-top: 30px; border: 0; border-top: 1px solid #E3DDD1; }
  .stats { display: flex; gap: 0; margin-top: 28px; }
  .stat { width: 360px; }
  .stat b { display: block; color: #1F4E79; font-size: 38px; font-weight: 700; }
  .stat span { display: block; margin-top: 8px; color: #6B675E; font-size: 19px; font-weight: 500; }
  .byline { position: absolute; bottom: 34px; left: 80px; color: #6B675E; font-size: 19px; font-weight: 600; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="masthead-line"><span>JONATHAN FRIBERT</span><span>CASE STUDY</span><span>JULY 2026</span></div>
  <div class="masthead-rule"></div>
  <h1>I built a news monitor<br>for a staff member at the Danish<br>Prime Minister's Office</h1>
  <hr>
  <div class="stats">
    <div class="stat"><b>5 days</b><span>from idea to production</span></div>
    <div class="stat"><b>406 items</b><span>reviewed manually</span></div>
    <div class="stat"><b>&lt; DKK 50</b><span>total operating cost</span></div>
  </div>
  <div class="byline">FROM A REAL NEED TO A LIVE TOOL</div>
</body>
</html>
